<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 2 Web Design - Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Logo -->
            <div class="logo">
                <img src="Chapter 2 Web Design Logo.png" alt="Chapter 2 Web Design Logo">
            </div>

            <!-- Coming Soon Message -->
            <div class="coming-soon">
                <h2>Coming Soon</h2>
                <p>We're crafting something exceptional for you</p>
            </div>

            <!-- Email Signup -->
            <form class="email-form" id="emailForm">
                <input 
                    type="email" 
                    placeholder="Enter your email" 
                    required
                    aria-label="Email address"
                >
                <button type="submit">Notify Me</button>
            </form>

            <!-- Contact Info -->
            <div class="contact-info">
                <p>
                    <a href="mailto:josh@chapter2webdesign.com" aria-label="Email us">
                        <i class="fas fa-envelope"></i> josh@chapter2webdesign.com
                    </a>
                </p>
            </div>

            <!-- Social Links -->
            <div class="social-links">
                <a href="https://www.facebook.com/chapter2webdesign" target="_blank" rel="noopener noreferrer" aria-label="Visit our Facebook page">
                    <i class="fab fa-facebook"></i>
                </a>
            </div>
        </div>
    </div>

    <!-- Notification toast -->
    <div class="notification" id="notification"></div>

    <script src="script.js"></script>
</body>
</html>
